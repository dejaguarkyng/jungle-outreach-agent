llm:
  mode: "heuristic"
  model: "template"
  temperature: 0.2
  timeout_seconds: 45

scoring:
  outreach_threshold: 7
  queue_limit: 25

company:
  company_name: "Jungle Grid"
  company_pitch: "Jungle Grid helps AI teams find GPU capacity, choose the right hardware, and deploy workloads without the usual GPU infrastructure friction."

safety:
  manual_only: true

paths:
  raw_dir: "data/raw"
  normalized_path: "data/normalized/leads.json"
  deduped_path: "data/processed/deduped_leads.json"
  classified_path: "data/enriched/leads_classified.json"
  scored_path: "data/enriched/leads_scored.json"
  drafts_path: "data/outreach/outreach_drafts.json"
  outreach_queue_path: "outreach_queue.json"
  prompts_dir: "prompts"
