discovery:
  recent_days: 30
  sources:
    reddit:
      enabled: true
      limit_per_query: 20
      user_agent: "jungle-grid-leads/0.1"
    github:
      enabled: true
      limit_per_query: 20
      user_agent: "jungle-grid-leads/0.1"
      bearer_token_env: "GITHUB_TOKEN"
    hackernews:
      enabled: true
      limit_per_query: 20
    x:
      enabled: true
      optional: true
      limit_per_query: 15
      bearer_token_env: "X_API_BEARER_TOKEN"
  queries:
    provider_pain:
      - "gpu cloud quota issue"
      - "gpu provider pricing painful"
      - "can't get gpu instances"
      - "gpu cloud unreliable"
    gpu_selection_pain:
      - "which GPU for LLM inference"
      - "A100 vs H100 vs L40S"
      - "choosing GPU for fine tuning"
      - "what GPU do I need for AI deployment"
    deployment_pain:
      - "deploying LLM to production pain"
      - "vllm deployment issues"
      - "gpu inference latency issue"
      - "kubernetes gpu inference problems"

dedupe:
  complaint_similarity_threshold: 0.82

