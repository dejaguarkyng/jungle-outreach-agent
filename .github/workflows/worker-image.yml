name: Publish outreach worker image

on:
  pull_request:
    paths:
      - Dockerfile.worker
      - workers/outreach/**
      - examples/**
      - .github/workflows/worker-image.yml
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: junglegrid/outreach-qwen-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          load: true
          push: false
          tags: jungle-outreach-worker:smoke

      - name: Worker smoke test
        run: |
          mkdir -p artifacts
          docker run --rm \
            -e FIT_SCORE_THRESHOLD=60 \
            -v "$PWD/artifacts:/workspace/artifacts" \
            --entrypoint python \
            jungle-outreach-worker:smoke \
            /app/workers/outreach/outreach_worker.py \
            --job full-run-template \
            --target 2 \
            --output /workspace/artifacts \
            --input /app/examples/sample-worker-input.json
          test -s artifacts/email_drafts.json

      - name: Login to Docker Hub
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
