name: Worker image

on:
  pull_request:
    paths:
      - Dockerfile.worker
      - workers/outreach/**
      - examples/**
      - .github/workflows/worker-image.yml
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/jungle-grid/outreach-qwen-worker
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          load: true
          tags: jungle-outreach-worker:smoke
      - name: Worker smoke test
        run: |
          mkdir -p artifacts
          docker run --rm \
            -e FIT_SCORE_THRESHOLD=60 \
            -v "$PWD/artifacts:/workspace/artifacts" \
            jungle-outreach-worker:smoke \
            --job full-run-template \
            --target 2 \
            --output /workspace/artifacts \
            --input /app/examples/sample-worker-input.json
          test -s artifacts/email_drafts.json
      - uses: docker/build-push-action@v6
        if: startsWith(github.ref, 'refs/tags/')
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
