name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: python -m pip install -e ".[dev]"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:python
      - run: python -m pytest -q
      - run: npm run build
