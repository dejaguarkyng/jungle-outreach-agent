name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: python -m pip install pip-audit
      - run: pip-audit -r workers/outreach/requirements.txt
      - name: Reject hosted model credential names
        shell: bash
        run: |
          forbidden=(
            'OPEN''AI_API_KEY'
            'DEEP''SEEK_API_KEY'
            'ANTH''ROPIC_API_KEY'
            'GEM''INI_API_KEY'
            'GOOGLE''_CLIENT_ID'
            'GOOGLE''_CLIENT_SECRET'
            'GOOGLE''_REFRESH_TOKEN'
            'GMAIL''_SEND_AS'
            'users.messages.''send'
            'users.drafts.''send'
          )
          for name in "${forbidden[@]}"; do
            if git grep -n "$name" -- ':!data/**' ':!package-lock.json' ':!docs/zeptomail-implementation-notes.md'; then
              echo "Forbidden credential name found."
              exit 1
            fi
          done
      - name: Draft-only source check
        run: npm test -- --run test/no-send.test.ts
